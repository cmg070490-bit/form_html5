<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Payment Form</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body>

    <div class="container mt-5 border border-secondary-subtle rounded-3 bg-light shadow-sm ps-2 pe-2 ">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

        <nav class="navbar navbar-light bg-light border-bottom border-secondary-subtle rounded-top-3">

            <div class="container-fluid">

                <a class="navbar-brand fw-bold fs-2 ms-3" href="#">
                    Payment form example
                </a>

            </div>

        </nav>


















        <form class="needs-validation" novalidate>
            <!-- ROW 1 -->
            <div class="row mb-3">

                <div class="col-lg-6 col-12">

                    <label class="form-label">
                        Card #
                    </label>

                    <input type="number" class="form-control" placeholder="XXXXXXXXXXXXXXXX" maxlength="19"
                        inputmode="numeric" required>
                    <div class="valid-feedback">
                        Looks good!
                    </div>

                </div>

                <div class="col-lg-3 col-12">

                    <label class="form-label">
                        CVC
                    </label>

                    <input type="number" class="form-control" placeholder="0000" maxlength="3" inputmode="numeric"
                        required>
                    <div class="valid-feedback">
                        Looks good!
                    </div>

                </div>

                <div class="col-lg-3 col-12">

                    <label class="form-label">
                        Amount
                    </label>

                    <div class="input-group">

                        <span class="input-group-text">
                            $
                        </span>

                        <input type="text" class="form-control" placeholder="Amount" inputmode="numeric" required>
                        <div class="valid-feedback">
                            Looks good!
                        </div>
                    </div>

                </div>

            </div>

            <!-- ROW 2 -->
            <div class="row mb-3">

                <div class="col-lg-6 col-12">

                    <label class="form-label">
                        First Name
                    </label>

                    <input type="text" class="form-control" inputmode="text" required>
                    <div class="valid-feedback">
                        Looks good!
                    </div>
                </div>

                <div class="col-lg-6 col-12">

                    <label class="form-label">
                        Last Name
                    </label>

                    <input type="text" class="form-control" inputmode="text" required>
                    <div class="valid-feedback">
                        Looks good!
                    </div>
                </div>

            </div>

            <!-- ROW 3 -->
            <div class="row mb-4">

                <div class="col-lg-6 col-12">

                    <label class="form-label">
                        City
                    </label>

                    <input type="text" class="form-control" inputmode="text" required>
                    <div class="valid-feedback">
                        Looks good!
                    </div>
                </div>

                <div class="col-lg-3 col-12">

                    <label class="form-label">
                        State
                    </label>

                    <select class="form-select" required>

                        <option selected disabled>
                            Pick a state
                        </option>

                        <option>Valencia</option>
                        <option>Madrid</option>
                        <option>Barcelona</option>
                        <option>Sevilla</option>

                    </select>
                    <div class="valid-feedback">
                        Looks good!
                    </div>
                </div>

                <div class="col-lg-3 col-12">

                    <label class="form-label">
                        Postal Code
                    </label>

                    <input type="text" class="form-control" inputmode="numeric" required>
                    <div class="valid-feedback">
                        Looks good!
                    </div>
                </div>

            </div>

            <!-- ROW 4 -->
            <div class="row align-items-end mb-4">

                <!-- TARJETAS -->
                <div class="col-lg-6 col-12 mb-5">

                    <label class="form-label d-block">
                        We accept:
                    </label>

                    <div class="btn-group" role="group">

                        <!-- VISA -->
                        <input type="radio" class="btn-check" name="card" id="visa" autocomplete="off" required>

                        <label class="btn bg-secondary text-white" for="visa">
                            ● <i class="bi bi-credit-card"></i>
                        </label>

                        <!-- MASTERCARD -->
                        <input type="radio" class="btn-check" name="card" id="mastercard" autocomplete="off" required>

                        <label class="btn bg-secondary text-white" for="mastercard">
                            ● <i class="bi bi-credit-card-2-front"></i>
                        </label>

                        <!-- AMEX -->
                        <input type="radio" class="btn-check" name="card" id="amex" autocomplete="off" required>

                        <label class="btn bg-secondary text-white" for="amex">
                            ● <i class="bi bi-credit-card-2-back"></i>
                        </label>

                        <!-- PAYPAL -->
                        <input type="radio" class="btn-check" name="card" id="paypal" autocomplete="off" required>

                        <label class="btn bg-secondary text-white" for="paypal">
                            ● <i class="bi bi-paypal"></i>
                        </label>

                    </div>
                    <div class="valid-feedback">
                        Looks good!
                    </div>
                </div>

                <!-- MESSAGE -->
                <div class="col-lg-6 col-12">

                    <label class="form-label">
                        Message
                    </label>

                    <textarea class="form-control bg-light" rows="2" placeholder="Write your message here..."
                        required></textarea>
                    <div class="valid-feedback">
                        Looks good!
                    </div>
                    Add any notes here.
                </div>

            </div>

            <!-- BUTTONS -->
            <div class="d-flex justify-content-end gap-2">

                <button class="btn btn-secondary">
                    Cancel
                </button>

                <button class="btn btn-primary" type="submit">
                    Send
                </button>

            </div>
        </form>
    </div>
    <script>  (() => { const form = document.querySelector('.needs-validation'); form.addEventListener('submit', event => { if (!form.checkValidity()) { event.preventDefault(); event.stopPropagation(); } form.classList.add('was-validated'); }); })(); </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

</body>

</html>
